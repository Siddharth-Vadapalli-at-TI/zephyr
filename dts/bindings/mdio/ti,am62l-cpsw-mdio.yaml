description: TI AM62L CPSW MDIO controller

compatible: "ti,am62l-cpsw-mdio"

include: [mdio-controller.yaml]

properties:
  reg:
    required: true
    description: |
      MDIO Controller register offset from CPSW Base Address.

  clock-names:
    required: true
    description: |
      Clock name "fck" to indicate the functional clock for the
      MDIO Controller.
